name: Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release from
        required: true
        type: string
        default: main

permissions:
  contents: read

jobs:
  disabled:
    name: Release disabled - repository moved
    runs-on: ubuntu-latest
    steps:
      - name: Fail with pointer to new location
        run: |
          echo "::error::This repository has moved to elastic/esql-js (packages/prismjs-esql)."
          echo "::error::Releases are now published from that monorepo. This workflow is disabled to prevent accidental npm publishes from the old repo."
          echo "::error::See https://github.com/elastic/esql-js/tree/main/packages/prismjs-esql"
          exit 1
